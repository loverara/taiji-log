name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: macos-13
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: macos-14
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}
      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        run: |
          mkdir -p dist
          tar -czf dist/taiji-log-${{ matrix.target }}.tar.gz -C target/${{ matrix.target }}/release taiji-log
      - name: Package (zip)
        if: matrix.archive == 'zip'
        run: |
          mkdir dist
          powershell -NoProfile -Command "Copy-Item -Force -Path target\\${{ matrix.target }}\\release\\taiji-log.exe -Destination dist\\taiji-log.exe; Compress-Archive -Path dist\\taiji-log.exe -DestinationPath dist\\taiji-log-${{ matrix.target }}.zip -Force; Remove-Item -Force dist\\taiji-log.exe"
      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.target }}
          path: dist/*

  release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Generate sha256sums
        run: |
          cd dist
          sha256sum * > sha256sums.txt
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
